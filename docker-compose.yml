services:
  keycloak:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        KEYCLOAK_VERSION: ${KEYCLOAK_VERSION:-26.6.3}
    image: keycloak-custom:local
    ports:
      - "8080:8080"
    command: start-dev --import-realm --spi-theme-default-login-theme=keycloak-theme
    volumes:
      - ./realm-import.json:/opt/keycloak/data/import/realm-import.json:ro
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
